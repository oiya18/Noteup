<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NoteSnap</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<header>

<h1>📚 NoteSnap</h1>


<nav>

<button onclick="showPage('home')">
🏠 Home
</button>


<button onclick="showPage('scanner')">
📷 Scanner
</button>


<button onclick="showPage('study')">
🧠 Study
</button>


<button onclick="showPage('saved')">
💾 Saved
</button>


</nav>

</header>



<!-- HOME -->

<section id="home" class="page">


<h2>
Welcome to NoteSnap!
</h2>


<p>
Convert notes into digital study materials.
</p>


<button onclick="showPage('scanner')">
Start Scanning
</button>


</section>





<!-- SCANNER -->


<section id="scanner" class="page hidden">


<h2>
📷 Scan Notes
</h2>



<label for="imageInput" class="upload-btn">

Upload Notes

</label>


<input 
type="file"
id="imageInput"
accept="image/*">



<img id="preview">



<div class="button-group">


<button id="convertBtn">
Convert
</button>


<button id="formatBtn">
✨ Format
</button>


<button id="saveBtn">
💾 Save
</button>


</div>



<p id="status">
Waiting...
</p>



<textarea id="output">

</textarea>


</section>





<!-- STUDY -->


<section id="study" class="page hidden">


<h2>
🧠 Study Tools
</h2>


<button id="studyBtn">
Create Study Guide
</button>


<button id="flashcardBtn">
Create Flashcards
</button>


<button id="quizBtn">
Create Quiz
</button>



<div id="studyGuide"></div>

<div id="flashcards"></div>

<div id="quiz"></div>



</section>





<!-- SAVED -->


<section id="saved" class="page hidden">


<h2>
💾 Saved Notes
</h2>


<div id="savedNotes">

No saved notes.

</div>


</section>






<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>


<script src="features/study.js"></script>

<script src="features/flashcards.js"></script>

<script src="features/quiz.js"></script>

<script src="features/formatter.js"></script>

<script src="features/storage.js"></script>


<script src="script.js"></script>


</body>

</html>
