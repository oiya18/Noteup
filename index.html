<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Note Scanner</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>📚 Note Scanner</h1>

<p>
Turn handwritten notes into digital text.
</p>


<label for="imageInput" class="upload-btn">
Upload Notes
</label>

<input 
type="file"
id="imageInput"
accept="image/*">


<img id="preview">



<div class="button-group">

<button id="convertBtn">
Convert Notes
</button>


<button id="copyBtn">
📋 Copy
</button>


<button id="downloadBtn">
⬇ Download
</button>


<button id="clearBtn">
🗑 Clear
</button>


</div>



<p id="status">
Waiting for image...
</p>



<h2>📝 Original Notes</h2>

<textarea 
id="output"
placeholder="Your notes will appear here...">
</textarea>


<h2>📚 Study Guide</h2>

<div id="studyGuide">

Your study guide will appear here.

</div>


<button id="studyBtn">

📚 Create Study Guide

</button>


<h2>🧠 Flashcards</h2>

<div id="flashcards">

Flashcards will appear here.

</div>


<button id="flashcardBtn">

🧠 Create Flashcards

</button>


<h2>❓ Quiz</h2>

<div id="quiz">

Quiz will appear here.

</div>


<button id="quizBtn">

❓ Create Quiz

</button>


</div>



<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>


<script src="features/study.js"></script>
<script src="features/flashcards.js"></script>
<script src="features/quiz.js"></script>

<script src="script.js"></script>

</body>

</html>
